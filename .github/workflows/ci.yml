name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'assets/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck-and-build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # We deliberately skip install scripts because better-sqlite3's
      # gyp build doesn't apply to Linux CI — we don't run Electron here,
      # we only need TS compilation and the bundle. The native module
      # rebuild only matters for `npm run dev` / packaging.
      - name: Install (no native build)
        run: npm install --ignore-scripts

      - name: Typecheck
        run: npm run typecheck

      - name: Build (electron-vite bundles)
        run: npm run build

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: out-${{ github.sha }}
          path: out/
          retention-days: 7
