name: Release Windows installer

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install (skip native build)
        shell: bash
        run: npm install --ignore-scripts

      - name: Download Electron binary
        shell: bash
        run: node node_modules/electron/install.js

      - name: Rebuild native modules against Electron
        shell: bash
        run: npx electron-builder install-app-deps

      - name: Typecheck
        shell: bash
        run: npm run typecheck

      - name: Build Windows installer & publish draft release
        shell: bash
        env:
          # Skip code signing — no cert wired up yet.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          # electron-builder needs this to create the draft release and
          # upload the installer + latest.yml + blockmap to it. The
          # release is published as a draft (see electron-builder.yml
          # publish.releaseType: draft); a human clicks Publish in the
          # UI to roll the update out to existing v0.2.0+ installs.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:win

      - name: List release artifacts
        shell: bash
        run: ls -la release/

      - name: Upload installer artifact (CI debug copy, 90-day)
        uses: actions/upload-artifact@v4
        with:
          name: roundhouse-windows-installer
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
          retention-days: 90

      - name: Generate auto release notes
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # electron-builder created the draft; populate its body with the
          # standard GitHub-style "What's Changed" notes generated from the
          # commits since the previous tag.
          gh release edit "$TAG" \
            --repo "${{ github.repository }}" \
            --generate-notes
